<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="RoboLogAI admin entry page for internal content management tools.">
    <meta name="robots" content="noindex">
    <title>robologai Admin</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d1117;
        color: #e6edf3;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(560px, 100%);
        border: 1px solid rgba(230, 237, 243, 0.16);
        border-radius: 8px;
        padding: 28px;
        background: #161b22;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #b7c0cc;
        line-height: 1.6;
      }

      code {
        color: #79c0ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Robologai Admin</h1>
      <p>This site now publishes through Cloudflare Pages. For now, update posts in <code>content/posts.json</code> and let Cloudflare publish the latest version.</p>
    </main>
  </body>
</html>
