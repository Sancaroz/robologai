<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>robologai özgün görseller</title>
    <style>
      body { margin: 0; background: #020812; color: #f7fbff; font-family: Inter, system-ui, sans-serif; }
      main { width: min(1180px, calc(100% - 40px)); margin: 0 auto; padding: 40px 0; }
      h1 { font-size: clamp(34px, 5vw, 64px); margin: 0 0 12px; }
      p { color: #aebbd0; line-height: 1.6; margin: 0 0 28px; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      figure { margin: 0; border: 1px solid rgba(148,163,184,.22); border-radius: 12px; overflow: hidden; background: rgba(17,29,48,.82); }
      img { display: block; width: 100%; aspect-ratio: 16 / 10; object-fit: cover; }
      figcaption { padding: 14px 16px; color: #d9e8ff; font-weight: 700; }
      @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <h1>robologai özgün görsel seti</h1>
      <p>Bu görseller başkalarına ait logo, ürün, karakter veya fotoğraf kullanmadan geometrik olarak oluşturuldu.</p>
      <div class="grid">
        <figure><img src="ai-orbit-core.svg" alt=""><figcaption>AI Orbit Core</figcaption></figure>
        <figure><img src="humanoid-profile-blueprint.svg" alt=""><figcaption>Humanoid Profile Blueprint</figcaption></figure>
        <figure><img src="neural-city-grid.svg" alt=""><figcaption>Neural City Grid</figcaption></figure>
        <figure><img src="robot-hand-interface.svg" alt=""><figcaption>Robot Hand Interface</figcaption></figure>
        <figure><img src="ai-chip-landscape.svg" alt=""><figcaption>AI Chip Landscape</figcaption></figure>
        <figure><img src="data-constellation.svg" alt=""><figcaption>Data Constellation</figcaption></figure>
      </div>
    </main>
  </body>
</html>
